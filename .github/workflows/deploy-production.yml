name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: prod-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitnexa-business-landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@gymia-fit'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tags.outputs.sha-tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHA_TAG="ghcr.io/gymia-fit/fitnexa-business-landing:prod-${{ github.sha }}"
          LATEST_TAG="ghcr.io/gymia-fit/fitnexa-business-landing:prod-latest"
          echo "sha-tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest-tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: fitnexa-business-landing
          file: fitnexa-business-landing/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.sha-tag }}
            ${{ steps.tags.outputs.latest-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout infra
        uses: actions/checkout@v4
        with:
          repository: gymia-fit/fitnexa-infra
          token: ${{ secrets.INFRA_TOKEN }}
          path: infra

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Deploy landing page
        run: |
          TAG="${{ needs.build.outputs.image-tag }}"
          TAG="${TAG##*:}"
          helm upgrade --install business-landing \
            ./infra/helm/fitnexa-service \
            --namespace fitnexa \
            --set image.repository=ghcr.io/gymia-fit/fitnexa-business-landing \
            --set image.tag=$TAG \
            -f ./infra/helm/values/business-landing.yaml \
            --atomic --cleanup-on-fail --wait --timeout 120s

      - name: Verify rollout
        run: kubectl rollout status deployment/business-landing --namespace fitnexa --timeout 60s

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n fitnexa -l app.kubernetes.io/name=business-landing -o wide
          kubectl logs -n fitnexa -l app.kubernetes.io/name=business-landing --tail=100 || true
