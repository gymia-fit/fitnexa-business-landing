name: Deploy UAT Frontend

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
        description: 'Frontend app name (e.g. gym-admin)'
    secrets:
      NPM_TOKEN:
        required: true
      UAT_HOST:
        required: true
      UAT_SSH_KEY:
        required: true
      VITE_API_URL:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@gymia-fit'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.UAT_HOST }}
          username: fitnexa
          key: ${{ secrets.UAT_SSH_KEY }}
          source: dist/*
          target: /opt/fitnexa/frontend/${{ inputs.app-name }}/dist/
          strip_components: 1
          overwrite: true
