name: Configure Kubernetes Secrets

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace'
        required: true
        default: 'fitnexa'
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - all
          - common
          - database
          - auth-service
          - gateway
          - tracker-service
          - wizard-service

env:
  NAMESPACE: ${{ github.event.inputs.namespace || 'fitnexa' }}

jobs:
  configure-secrets:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 🔑 Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      # ===========================================
      # COMMON SECRETS (All backend services)
      # ===========================================
      - name: 🔐 Create Common Secrets
        if: github.event.inputs.action == 'all' || github.event.inputs.action == 'common'
        run: |
          echo "Creating fitnexa-common secret..."
          kubectl create secret generic fitnexa-common \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=SERVICE_SECRET="${{ secrets.SERVICE_SECRET }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ fitnexa-common secret created"

      # ===========================================
      # DATABASE SECRETS (Per service)
      # ===========================================
      - name: 🔐 Create Database Secrets
        if: github.event.inputs.action == 'all' || github.event.inputs.action == 'database'
        run: |
          # Auth service database
          kubectl create secret generic auth-service-db \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL_AUTH }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ auth-service-db secret created"

          # Gym service database
          kubectl create secret generic gym-service-db \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL_GYM }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ gym-service-db secret created"

          # Tracker service database
          kubectl create secret generic tracker-service-db \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL_TRACKER }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ tracker-service-db secret created"

          # Wizard service database
          kubectl create secret generic wizard-service-db \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL_WIZARD }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ wizard-service-db secret created"

      # ===========================================
      # AUTH SERVICE SECRETS
      # ===========================================
      - name: 🔐 Create Auth Service Secrets
        if: github.event.inputs.action == 'all' || github.event.inputs.action == 'auth-service'
        run: |
          kubectl create secret generic auth-service-secrets \
            --from-literal=SMTP_HOST="${{ secrets.SMTP_HOST }}" \
            --from-literal=SMTP_PORT="${{ secrets.SMTP_PORT }}" \
            --from-literal=SMTP_SECURE="${{ secrets.SMTP_SECURE }}" \
            --from-literal=SMTP_USER="${{ secrets.SMTP_USER }}" \
            --from-literal=SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            --from-literal=EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
            --from-literal=APP_BASE_URL="${{ secrets.APP_BASE_URL }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ auth-service-secrets created"

      # ===========================================
      # GATEWAY SECRETS
      # ===========================================
      - name: 🔐 Create Gateway Secrets
        if: github.event.inputs.action == 'all' || github.event.inputs.action == 'gateway'
        run: |
          kubectl create secret generic gateway-secrets \
            --from-literal=AUTH_SERVICE_URL="${{ secrets.AUTH_SERVICE_URL }}" \
            --from-literal=GYM_SERVICE_URL="${{ secrets.GYM_SERVICE_URL }}" \
            --from-literal=TRACKER_SERVICE_URL="${{ secrets.TRACKER_SERVICE_URL }}" \
            --from-literal=WIZARD_SERVICE_URL="${{ secrets.WIZARD_SERVICE_URL }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ gateway-secrets created"

      # ===========================================
      # TRACKER SERVICE SECRETS
      # ===========================================
      - name: 🔐 Create Tracker Service Secrets
        if: github.event.inputs.action == 'all' || github.event.inputs.action == 'tracker-service'
        run: |
          kubectl create secret generic tracker-service-secrets \
            --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ tracker-service-secrets created"

      # ===========================================
      # WIZARD SERVICE SECRETS
      # ===========================================
      - name: 🔐 Create Wizard Service Secrets
        if: github.event.inputs.action == 'all' || github.event.inputs.action == 'wizard-service'
        run: |
          kubectl create secret generic wizard-service-secrets \
            --from-literal=SMTP_HOST="${{ secrets.SMTP_HOST }}" \
            --from-literal=SMTP_PORT="${{ secrets.SMTP_PORT }}" \
            --from-literal=SMTP_SECURE="${{ secrets.SMTP_SECURE }}" \
            --from-literal=SMTP_USER="${{ secrets.SMTP_USER }}" \
            --from-literal=SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            --from-literal=EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ wizard-service-secrets created"

      # ===========================================
      # VERIFY ALL SECRETS
      # ===========================================
      - name: ✅ Verify Secrets
        run: |
          echo "=== Secrets in ${{ env.NAMESPACE }} namespace ==="
          kubectl get secrets -n ${{ env.NAMESPACE }} | grep -E "fitnexa-common|auth-service|gym-service|tracker-service|wizard-service|gateway"
          
          echo ""
          echo "=== Verifying fitnexa-common ==="
          kubectl get secret fitnexa-common -n ${{ env.NAMESPACE }} -o jsonpath='{.data}' | jq 'keys'
          
          echo ""
          echo "=== Verifying database secrets ==="
          for svc in auth gym tracker wizard; do
            echo "${svc}-service-db: $(kubectl get secret ${svc}-service-db -n ${{ env.NAMESPACE }} -o jsonpath='{.data.DATABASE_URL}' | base64 -d 2>/dev/null | cut -d@ -f2 || echo 'NOT FOUND')"
          done

      - name: 🚀 Restart Deployments
        run: |
          echo "Restarting deployments to pick up new secrets..."
          for deployment in auth-service gym-service tracker-service wizard-service gateway; do
            if kubectl get deployment $deployment -n ${{ env.NAMESPACE }} &>/dev/null; then
              kubectl rollout restart deployment/$deployment -n ${{ env.NAMESPACE }}
              echo "✅ Restarted $deployment"
            fi
          done

      - name: 📊 Deployment Status
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployments -n ${{ env.NAMESPACE }}
          
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
