name: CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '22'
      test-command:
        type: string
        default: 'npm run test -- --coverage --passWithNoTests'
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://npm.pkg.github.com
          scope: '@gymia-fit'
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: ${{ inputs.test-command }}
